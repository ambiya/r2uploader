<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (iOS Style Orange/Red matching Cloudflare) -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9F0A" />
      <stop offset="100%" stop-color="#FF3B30" />
    </linearGradient>
    
    <!-- Cloud Volume Gradient -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E5E5EA" />
    </linearGradient>

    <!-- Outer Drop Shadow for Cloud -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="30" flood-opacity="0.3" flood-color="#7A1500" />
    </filter>

    <!-- Arrow Mask to cut out of the cloud -->
    <mask id="cutout">
      <rect x="0" y="0" width="1024" height="1024" fill="white" />
      <g stroke="black" stroke-width="76" stroke-linecap="round" stroke-linejoin="round">
        <line x1="512" y1="637" x2="512" y2="387" />
        <polyline points="390,507 512,387 634,507" fill="none" />
      </g>
    </mask>
  </defs>

  <!-- iOS App Icon Squircle Background -->
  <!-- 230 is ~22.5% of 1024, the standard approximation for Apple's continuous squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bgGradient)" />

  <!-- Cloud with Mask and Shadow -->
  <g filter="url(#dropShadow)">
    <g mask="url(#cutout)">
      <!-- Translate Y by 52 to perfectly center the cloud vertically -->
      <g transform="translate(0, 52)">
        <!-- Left Bubble -->
        <circle cx="342" cy="550" r="130" fill="url(#cloudGradient)" />
        
        <!-- Right Bubble -->
        <circle cx="682" cy="550" r="130" fill="url(#cloudGradient)" />
        
        <!-- Center Top Bubble -->
        <circle cx="512" cy="430" r="190" fill="url(#cloudGradient)" />
        
        <!-- Base rectangle connecting left and right bubbles smoothly -->
        <rect x="342" y="550" width="340" height="130" fill="url(#cloudGradient)" />
      </g>
    </g>
  </g>
</svg>
